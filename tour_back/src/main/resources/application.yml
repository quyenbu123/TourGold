spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: tours
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/test_tour}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQL8Dialect
    show-sql: true
  web:
    resources:
      static-locations:
        - classpath:/static/
        - file:static/
  mvc:
    static-path-pattern: /static/**
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:${SERVER_PORT:8080}}
  servlet:
    session:
      cookie:
        http-only: true
        secure: true
  tomcat:
    max-swallow-size: -1
    max-http-form-post-size: 50MB

cloudinary:
  cloudName: ${CLOUDINARY_NAME:}
  apiKey: ${CLOUDINARY_KEY:}
  apiSecret: ${CLOUDINARY_SECRET:}

security:
  jwt:
    secret-key: ${JWT_SECRET:change-me-in-production}
    token-duration: ${JWT_TOKEN_DURATION:2H}
    refresh-token-duration: ${JWT_REFRESH_TOKEN_DURATION:7D}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
    allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS,PATCH}
    allowed-headers: ${CORS_ALLOWED_HEADERS:*}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}

payment:
  vietqr:
    bankCode: ${VIETQR_BANK_CODE:970415}
    accountNumber: ${VIETQR_ACCOUNT_NUMBER:}
    accountName: ${VIETQR_ACCOUNT_NAME:}
    description: ${VIETQR_DESCRIPTION:Thanh toan cho tour}
    clientId: ${VIETQR_CLIENT_ID:}
    apiId: ${VIETQR_API_ID:}
    baseUrl: ${VIETQR_BASE_URL:https://api.vietqr.io}
    redirectUrl: ${VIETQR_REDIRECT_URL:http://localhost:8080/api/v1/payment/redirect}
    ipnUrl: ${VIETQR_IPN_URL:http://localhost:8080/api/v1/payment/ipn}
  vnpay:
    version: ${VNPAY_VERSION:2.1.0}
    tmn-code: ${VNPAY_TMN_CODE:}
    hash-secret-key: ${VNPAY_SECRET_KEY:}
    url: ${VNPAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
    api-url: ${VNPAY_API_URL:https://sandbox.vnpayment.vn/paymentv2}
    return-url: ${VNPAY_RETURN_URL:http://localhost:3000/payment/status}
    ipn-url: ${VNPAY_IPN_URL:http://localhost:8080/api/v1/payment/vnpay/ipn}
  mock:
    enabled: ${PAYMENT_MOCK_ENABLED:false}
    auto-approve: ${PAYMENT_MOCK_AUTO_APPROVE:false}
    delay-ms: ${PAYMENT_MOCK_DELAY_MS:4500}

checkpayment:
  Casso:
    api-key: ${CASSO_API_KEY:}
    api-get-piad: ${CASSO_API_GET_PAID_URL:https://oauth.casso.vn/v2/transactions}

logging:
  level:
    org.springframework.security: INFO
    dev.tin.tour_back: INFO
    dev.tin.tour_back.service.AiChatService: DEBUG
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

app:
  frontend-base-url: ${APP_FRONTEND_BASE_URL:http://localhost:3000}
gemini:
  api:
    key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.0-flash}

google:
  client-id: ${GOOGLE_CLIENT_ID:}
